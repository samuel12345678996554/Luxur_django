<div class="card p-6 bg-white rounded-xl shadow">

  <h2 class="text-2xl font-bold mb-4">
    Editar Tipo de Propiedad
  </h2>

  <div class="field mb-4">

    <label class="block mb-2 font-semibold">
      Nombre
    </label>

    <input
      pInputText
      [(ngModel)]="propertyType.name"
      class="w-full">
  </div>

  <div class="flex gap-2">

    <p-button
      label="Actualizar"
      icon="pi pi-save"
      (onClick)="update()"
      [loading]="loading">
    </p-button>

    <p-button
      label="Cancelar"
      icon="pi pi-times"
      severity="secondary"
      [routerLink]="['/property-type']">
    </p-button>

  </div>

</div>

<p-toast></p-toast>
