<div class="max-w-4xl mx-auto p-6">
  <div class="bg-white rounded-lg shadow-lg p-8">
    <h2 class="text-2xl font-bold mb-6">Crear Propiedad</h2>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex flex-col">
          <label>Título *</label>
          <input pInputText formControlName="title" />
        </div>
        <div class="flex flex-col">
          <label>Dirección *</label>
          <input pInputText formControlName="address" />
        </div>
        <div class="flex flex-col">
          <label>Precio</label>
          <input pInputText formControlName="price" />
        </div>
        <div class="flex flex-col">
          <label>Área (m²)</label>
          <input pInputText formControlName="area" />
        </div>
        <div class="flex flex-col">
          <label>Habitaciones</label>
          <input pInputText formControlName="rooms" />
        </div>
        <div class="flex flex-col">
          <label>Estado *</label>
          <p-select formControlName="status" [options]="statusOptions"></p-select>
        </div>
      </div>

      <div class="flex justify-center mt-8">
        <button pButton type="submit" label="Guardar" icon="pi pi-save"></button>
        <button pButton type="button" label="Cancelar" icon="pi pi-times" (click)="cancelar()"></button>
      </div>
    </form>
  </div>
</div>

<p-toast></p-toast>
