<div class="max-w-5xl mx-auto p-6">

  <div class="bg-white rounded-xl shadow-lg p-8">

    <h2 class="text-3xl font-bold mb-2 text-gray-800">
      Crear Propiedad
    </h2>

    <p class="text-gray-500 mb-6">
      Registre una nueva propiedad en el sistema.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- TÍTULO -->

        <div class="flex flex-col">
          <label class="font-semibold mb-2">
            Título *
          </label>

          <input
            pInputText
            formControlName="title"
            class="w-full" />
        </div>

        <!-- DIRECCIÓN -->

        <div class="flex flex-col">
          <label class="font-semibold mb-2">
            Dirección *
          </label>

          <input
            pInputText
            formControlName="address"
            class="w-full" />
        </div>

        <!-- PRECIO -->

        <div class="flex flex-col">
          <label class="font-semibold mb-2">
            Precio
          </label>

          <p-inputNumber
            formControlName="price"
            mode="currency"
            currency="COP"
            locale="es-CO"
            class="w-full">
          </p-inputNumber>
        </div>

        <!-- ÁREA -->

        <div class="flex flex-col">
          <label class="font-semibold mb-2">
            Área (m²)
          </label>

          <p-inputNumber
            formControlName="area"
            class="w-full">
          </p-inputNumber>
        </div>

        <!-- HABITACIONES -->

        <div class="flex flex-col">
          <label class="font-semibold mb-2">
            Habitaciones
          </label>

          <p-inputNumber
            formControlName="rooms"
            class="w-full">
          </p-inputNumber>
        </div>

        <!-- ESTADO -->

        <div class="flex flex-col">
          <label class="font-semibold mb-2">
            Estado *
          </label>

          <p-select
            formControlName="status"
            [options]="statusOptions"
            optionLabel="label"
            optionValue="value"
            placeholder="Seleccione un estado"
            class="w-full">
          </p-select>
        </div>

        <!-- TIPO DE PROPIEDAD -->

        <div class="flex flex-col">
          <label class="font-semibold mb-2">
            Tipo de Propiedad
          </label>

          <p-select
            formControlName="property_type"
            [options]="propertyTypes"
            optionLabel="name"
            optionValue="id"
            placeholder="Seleccione un tipo"
            class="w-full">
          </p-select>
        </div>

        <!-- DESCRIPCIÓN -->

        <div class="flex flex-col md:col-span-2">

          <label class="font-semibold mb-2">
            Descripción
          </label>

          <textarea
            pInputTextarea
            rows="4"
            formControlName="description"
            class="w-full">
          </textarea>

        </div>

        <!-- AMENIDADES -->

        <div class="flex flex-col md:col-span-2">

          <label class="font-semibold mb-2">
            Amenidades
          </label>

          <p-multiSelect
            formControlName="amenities"
            [options]="amenities"
            optionLabel="name"
            optionValue="id"
            display="chip"
            placeholder="Seleccione amenidades"
            class="w-full">
          </p-multiSelect>

        </div>

      </div>

      <div class="flex justify-center gap-4 mt-8">

        <button
          pButton
          type="submit"
          label="Guardar"
          icon="pi pi-save">
        </button>

        <button
          pButton
          type="button"
          label="Cancelar"
          icon="pi pi-times"
          class="p-button-secondary"
          (click)="cancelar()">
        </button>

      </div>

    </form>

  </div>

</div>

<p-toast></p-toast>
