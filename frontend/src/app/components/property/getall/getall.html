<div class="card p-6 bg-white rounded-xl shadow">

  <div class="flex justify-between items-center mb-4">
    <div>
      <h2 class="text-2xl font-bold m-0">Gestión de Propiedades</h2>
      <p class="text-gray-500 m-0">
        Total registradas: {{ properties.length }}
      </p>
    </div>

    <p-button
      label="Nueva Propiedad"
      icon="pi pi-plus"
      [routerLink]="['/property/create']"
      styleClass="p-button-success">
    </p-button>
  </div>

  <div class="mb-4">
    <span class="p-input-icon-left w-full">
      <i class="pi pi-search"></i>

      <input
        pInputText
        type="text"
        class="w-full"
        placeholder="Buscar por título, dirección, precio o área..."
        (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
    </span>
  </div>

  <p-table
    #dt
    [value]="properties"
    [loading]="loading"
    [paginator]="true"
    [rows]="10"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
    [rowsPerPageOptions]="[5, 10, 25, 50]"
    [globalFilterFields]="['title', 'address', 'price', 'area']"
    dataKey="id"
    responsiveLayout="scroll"
    styleClass="p-datatable-striped p-datatable-gridlines"
    [tableStyle]="{'min-width': '50rem'}">

    <ng-template pTemplate="header">
      <tr>

        <th pSortableColumn="title">
          Título <p-sortIcon field="title"></p-sortIcon>
        </th>

        <th pSortableColumn="address">
          Dirección <p-sortIcon field="address"></p-sortIcon>
        </th>

        <th pSortableColumn="price">
          Precio <p-sortIcon field="price"></p-sortIcon>
        </th>

        <th pSortableColumn="area">
          Área <p-sortIcon field="area"></p-sortIcon>
        </th>

        <th class="text-center">
          Acciones
        </th>

      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-prop>
      <tr>

        <td>
          <div class="flex flex-col">
            <span class="font-semibold text-gray-800">
              {{ prop.title }}
            </span>
            <small class="text-gray-500">
              Propiedad registrada
            </small>
          </div>
        </td>

        <td>{{ prop.address }}</td>

        <td>
          <span class="font-semibold text-green-700">
            {{ prop.price | currency:'COP':'symbol':'1.0-0' }}
          </span>
        </td>

        <td>{{ prop.area }} m²</td>

        <td class="text-center">
          <div class="flex justify-center gap-2">

            <p-button
              icon="pi pi-pencil"
              [routerLink]="['/property/update', prop.id]"
              styleClass="p-button-rounded p-button-text p-button-warning"
              pTooltip="Editar"
              tooltipPosition="top">
            </p-button>

            <p-button
              icon="pi pi-trash"
              (onClick)="confirmDelete(prop)"
              styleClass="p-button-rounded p-button-text p-button-danger"
              pTooltip="Eliminar"
              tooltipPosition="top">
            </p-button>

          </div>
        </td>

      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center p-6">
          <div class="flex flex-col items-center gap-3">

            <i class="pi pi-home text-4xl text-gray-400"></i>

            <span class="text-gray-500">
              No se encontraron propiedades
            </span>

            <p-button
              label="Crear Primera Propiedad"
              icon="pi pi-plus"
              [routerLink]="['/property/create']"
              styleClass="p-button-sm p-button-outlined">
            </p-button>

          </div>
        </td>
      </tr>
    </ng-template>

  </p-table>

</div>

<p-confirmDialog></p-confirmDialog>
<p-toast></p-toast>
