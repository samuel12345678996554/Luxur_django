<div class="card p-6 bg-white rounded-xl shadow">

  <div class="flex justify-between items-center mb-4">
    <div>
      <h2 class="text-2xl font-bold m-0">Documentos de Contrato</h2>
      <p class="text-gray-500 m-0">
        Total registrados: {{ documents.length }}
      </p>
    </div>

    <p-button
      label="Nuevo Documento"
      icon="pi pi-plus"
      [routerLink]="['/contract-document/create']"
      styleClass="p-button-success">
    </p-button>
  </div>

  <div class="mb-4">
    <span class="p-input-icon-left w-full">
      <i class="pi pi-search"></i>

      <input
        pInputText
        type="text"
        class="w-full"
        placeholder="Buscar por contrato o nombre..."
        (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
    </span>
  </div>

  <p-table
    #dt
    [value]="documents"
    [loading]="loading"
    [paginator]="true"
    [rows]="10"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
    [rowsPerPageOptions]="[5, 10, 25, 50]"
    [globalFilterFields]="['contract_info', 'name']"
    dataKey="id"
    responsiveLayout="scroll"
    styleClass="p-datatable-striped p-datatable-gridlines"
    [tableStyle]="{'min-width': '50rem'}">

    <ng-template pTemplate="header">
      <tr>
        <th>ID</th>
        <th>Contrato</th>
        <th>Nombre</th>
        <th>Archivo</th>
        <th>Fecha subida</th>
        <th class="text-center">Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-document>
      <tr>
        <td>#{{ document.id }}</td>
        <td>{{ document.contract_info || document.contract }}</td>
        <td>{{ document.name }}</td>

        <td>
          <a
            *ngIf="document.file"
            [href]="document.file"
            target="_blank"
            class="text-blue-600 font-semibold">
            Ver archivo
          </a>
        </td>

        <td>{{ document.uploaded_at | date:'dd/MM/yyyy' }}</td>

        <td class="text-center">
          <div class="flex justify-center gap-2">

            <p-button
              icon="pi pi-pencil"
              [routerLink]="['/contract-document/update', document.id]"
              styleClass="p-button-rounded p-button-text p-button-warning"
              pTooltip="Editar">
            </p-button>

            <p-button
              icon="pi pi-trash"
              (onClick)="confirmDelete(document)"
              styleClass="p-button-rounded p-button-text p-button-danger"
              pTooltip="Eliminar">
            </p-button>

          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center p-6">
          No se encontraron documentos
        </td>
      </tr>
    </ng-template>

  </p-table>

</div>

<p-confirmDialog></p-confirmDialog>
<p-toast></p-toast>
