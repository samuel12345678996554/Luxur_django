<div class="max-w-4xl mx-auto p-6">

  <div class="bg-white rounded-lg shadow-lg p-8">

    <h2 class="text-2xl font-bold mb-6 text-gray-800">
      Editar Cliente
    </h2>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
      *ngIf="!loading">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- CÉDULA -->

        <div class="flex flex-col">

          <label class="block mb-2 font-semibold text-gray-700">
            Cédula *
          </label>

          <input
            pInputText
            formControlName="cedula"
            class="w-full"
            [class.ng-invalid]="
              form.get('cedula')?.invalid &&
              form.get('cedula')?.touched
            " />

          <small
            class="text-red-500 mt-1"
            *ngIf="getFieldError('cedula')">

            {{ getFieldError('cedula') }}

          </small>

        </div>

        <!-- NOMBRE -->

        <div class="flex flex-col">

          <label class="block mb-2 font-semibold text-gray-700">
            Nombre *
          </label>

          <input
            pInputText
            formControlName="name"
            class="w-full"
            [class.ng-invalid]="
              form.get('name')?.invalid &&
              form.get('name')?.touched
            " />

          <small
            class="text-red-500 mt-1"
            *ngIf="getFieldError('name')">

            {{ getFieldError('name') }}

          </small>

        </div>

        <!-- DIRECCIÓN -->

        <div class="flex flex-col">

          <label class="block mb-2 font-semibold text-gray-700">
            Dirección *
          </label>

          <input
            pInputText
            formControlName="address"
            class="w-full"
            [class.ng-invalid]="
              form.get('address')?.invalid &&
              form.get('address')?.touched
            " />

          <small
            class="text-red-500 mt-1"
            *ngIf="getFieldError('address')">

            {{ getFieldError('address') }}

          </small>

        </div>

        <!-- TELÉFONO -->

        <div class="flex flex-col">

          <label class="block mb-2 font-semibold text-gray-700">
            Teléfono *
          </label>

          <input
            pInputText
            formControlName="phone"
            class="w-full"
            [class.ng-invalid]="
              form.get('phone')?.invalid &&
              form.get('phone')?.touched
            " />

          <small
            class="text-red-500 mt-1"
            *ngIf="getFieldError('phone')">

            {{ getFieldError('phone') }}

          </small>

        </div>

        <!-- EMAIL -->

        <div class="flex flex-col">

          <label class="block mb-2 font-semibold text-gray-700">
            Email *
          </label>

          <input
            pInputText
            type="email"
            formControlName="email"
            class="w-full"
            [class.ng-invalid]="
              form.get('email')?.invalid &&
              form.get('email')?.touched
            " />

          <small
            class="text-red-500 mt-1"
            *ngIf="getFieldError('email')">

            {{ getFieldError('email') }}

          </small>

        </div>

        <!-- CONTRASEÑA -->

        <div class="flex flex-col md:col-span-2">

          <label class="block mb-2 font-semibold text-gray-700">
            Contraseña (Opcional)
          </label>

          <input
            pInputText
            type="password"
            formControlName="password"
            class="w-full"
            placeholder="Dejar vacío para no cambiar la contraseña" />

          <small class="text-gray-500 mt-1">
            Solo complete este campo si desea cambiar la contraseña actual.
          </small>

        </div>

      </div>

      <!-- BOTONES -->

      <div class="flex justify-center mt-8">

        <div class="bg-gray-50 rounded-lg p-4 flex gap-4 items-center">

          <button
            pButton
            type="submit"
            label="Actualizar"
            icon="pi pi-save"
            class="p-button-success"
            [loading]="loading"
            [disabled]="loading">
          </button>

          <button
            pButton
            type="button"
            label="Cancelar"
            icon="pi pi-times"
            class="p-button-secondary"
            (click)="cancelar()"
            [disabled]="loading">
          </button>

        </div>

      </div>

    </form>

    <!-- SPINNER -->

    <div
      class="flex justify-center"
      *ngIf="loading">

      <i
        class="pi pi-spin pi-spinner"
        style="font-size: 2rem">
      </i>

    </div>

  </div>

</div>

<p-toast></p-toast>
