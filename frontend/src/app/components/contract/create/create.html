<div class="min-h-screen bg-gray-50 p-6">

  <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-lg p-8">

    <div class="mb-8">
      <h2 class="text-3xl font-bold text-gray-800 m-0">
        Crear Nuevo Contrato
      </h2>

      <p class="text-gray-500 mt-2">
        Completa la información para registrar un contrato.
      </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">Cliente *</label>

          <p-select
            formControlName="client"
            [options]="clientOptions"
            placeholder="Seleccionar cliente"
            [filter]="true"
            filterPlaceholder="Buscar cliente"
            styleClass="w-full block">
          </p-select>

          <small class="text-red-500" *ngIf="getFieldError('client')">
            {{ getFieldError('client') }}
          </small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">Propiedad *</label>

          <p-select
            formControlName="property"
            [options]="propertyOptions"
            placeholder="Seleccionar propiedad"
            [filter]="true"
            filterPlaceholder="Buscar propiedad"
            styleClass="w-full block">
          </p-select>

          <small class="text-red-500" *ngIf="getFieldError('property')">
            {{ getFieldError('property') }}
          </small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">Fecha Inicio *</label>

          <p-datepicker
            formControlName="start_date"
            dateFormat="dd/mm/yy"
            [showIcon]="true"
            placeholder="Seleccionar fecha"
            styleClass="w-full block"
            inputStyleClass="w-full">
          </p-datepicker>

          <small class="text-red-500" *ngIf="getFieldError('start_date')">
            {{ getFieldError('start_date') }}
          </small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">Fecha Fin *</label>

          <p-datepicker
            formControlName="end_date"
            dateFormat="dd/mm/yy"
            [showIcon]="true"
            placeholder="Seleccionar fecha"
            styleClass="w-full block"
            inputStyleClass="w-full">
          </p-datepicker>

          <small class="text-red-500" *ngIf="getFieldError('end_date')">
            {{ getFieldError('end_date') }}
          </small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">Monto Total *</label>

          <p-inputnumber
            formControlName="total_amount"
            mode="currency"
            currency="COP"
            locale="es-CO"
            [min]="0"
            styleClass="w-full block"
            inputStyleClass="w-full">
          </p-inputnumber>

          <small class="text-red-500" *ngIf="getFieldError('total_amount')">
            {{ getFieldError('total_amount') }}
          </small>
        </div>

        <div class="form-field flex flex-col gap-2">
          <label class="font-semibold text-gray-700">Estado *</label>

          <p-select
            formControlName="status"
            [options]="statusOptions"
            placeholder="Seleccionar estado"
            styleClass="w-full block">
          </p-select>
        </div>

      </div>

      <div class="flex justify-end gap-3 mt-8 pt-6 border-t">

        <button
          pButton
          type="button"
          label="Cancelar"
          icon="pi pi-times"
          class="p-button-secondary"
          (click)="cancelar()"
          [disabled]="loading">
        </button>

        <button
          pButton
          type="submit"
          label="Guardar"
          icon="pi pi-save"
          class="p-button-success"
          [loading]="loading"
          [disabled]="form.invalid || loading">
        </button>

      </div>

    </form>

  </div>

</div>

<p-toast></p-toast>
