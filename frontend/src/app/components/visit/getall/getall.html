<div class="card p-6 bg-white rounded-xl shadow">

  <div class="flex justify-between items-center mb-4">

    <div>
      <h2 class="text-2xl font-bold m-0">
        Gestión de Visitas
      </h2>

      <p class="text-gray-500 m-0">
        Total registradas: {{ visits.length }}
      </p>
    </div>

    <p-button
      label="Nueva Visita"
      icon="pi pi-plus"
      [routerLink]="['/visit/create']"
      styleClass="p-button-success">
    </p-button>

  </div>

  <!-- BUSCADOR -->

  <div class="mb-4">

    <span class="p-input-icon-left w-full">

      <i class="pi pi-search"></i>

      <input
        pInputText
        type="text"
        class="w-full"
        placeholder="Buscar por cliente, propiedad o estado..."
        (input)="dt.filterGlobal($any($event.target).value, 'contains')" />

    </span>

  </div>

  <p-table
    #dt
    [value]="visits"
    [loading]="loading"
    [paginator]="true"
    [rows]="10"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
    [rowsPerPageOptions]="[5,10,25,50]"
    [globalFilterFields]="[
      'client_name',
      'client_cedula',
      'property_title',
      'status',
      'observations'
    ]"
    dataKey="id"
    responsiveLayout="scroll"
    styleClass="p-datatable-striped p-datatable-gridlines">

    <ng-template pTemplate="header">

      <tr>

        <th pSortableColumn="client_name">
          Cliente
          <p-sortIcon field="client_name"></p-sortIcon>
        </th>

        <th pSortableColumn="property_title">
          Propiedad
          <p-sortIcon field="property_title"></p-sortIcon>
        </th>

        <th pSortableColumn="date">
          Fecha
          <p-sortIcon field="date"></p-sortIcon>
        </th>

        <th pSortableColumn="status">
          Estado
          <p-sortIcon field="status"></p-sortIcon>
        </th>

        <th>
          Resultado
        </th>

        <th class="text-center">
          Acciones
        </th>

      </tr>

    </ng-template>

    <ng-template pTemplate="body" let-visit>

      <tr>

        <!-- CLIENTE -->

        <td>

          <div class="flex flex-col">

            <span class="font-semibold">
              {{ visit.client_name }}
            </span>

            <small class="text-gray-500">
              {{ visit.client_cedula }}
            </small>

          </div>

        </td>

        <!-- PROPIEDAD -->

        <td>

          {{ visit.property_title }}

        </td>

        <!-- FECHA -->

        <td>

          {{ visit.date | date:'dd/MM/yyyy' }}

        </td>

        <!-- ESTADO -->

        <td>

          <p-tag
            [value]="getStatusLabel(visit.status)"
            [severity]="getStatusSeverity(visit.status)">
          </p-tag>

        </td>

        <!-- RESULTADO -->

        <td>

          {{ visit.result || 'Sin resultado registrado' }}

        </td>

        <!-- ACCIONES -->

        <td class="text-center">

          <div class="flex justify-center gap-2">

            <p-button
              icon="pi pi-pencil"
              [routerLink]="['/visit/update', visit.id]"
              styleClass="p-button-rounded p-button-text p-button-warning"
              pTooltip="Editar">
            </p-button>

            <p-button
              icon="pi pi-trash"
              (onClick)="confirmDelete(visit)"
              styleClass="p-button-rounded p-button-text p-button-danger"
              pTooltip="Eliminar">
            </p-button>

          </div>

        </td>

      </tr>

    </ng-template>

    <ng-template pTemplate="emptymessage">

      <tr>

        <td colspan="6" class="text-center p-6">

          <div class="flex flex-col items-center gap-3">

            <i class="pi pi-calendar text-4xl text-gray-400"></i>

            <span class="text-gray-500">
              No se encontraron visitas
            </span>

          </div>

        </td>

      </tr>

    </ng-template>

  </p-table>

</div>

<p-confirmDialog></p-confirmDialog>
<p-toast></p-toast>
