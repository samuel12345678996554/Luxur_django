<div class="card p-6 bg-white rounded-xl shadow">

  <h2 class="text-2xl font-bold mb-4">
    Nueva Visita
  </h2>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

    <!-- CLIENTE -->

    <div>
      <label class="block mb-2 font-semibold">
        Cliente
      </label>

      <p-select
        [(ngModel)]="visit.client"
        [options]="clients"
        optionLabel="name"
        optionValue="id"
        placeholder="Seleccione cliente"
        styleClass="w-full">
      </p-select>
    </div>

    <!-- PROPIEDAD -->

    <div>
      <label class="block mb-2 font-semibold">
        Propiedad
      </label>

      <p-select
        [(ngModel)]="visit.property"
        [options]="properties"
        optionLabel="title"
        optionValue="id"
        placeholder="Seleccione propiedad"
        styleClass="w-full"
        (onChange)="onPropertyChange($event.value)">
      </p-select>
    </div>

    <!-- RESUMEN PROPIEDAD -->

    <div
      *ngIf="selectedProperty"
      class="md:col-span-2 bg-blue-50 border border-blue-200 rounded-lg p-4">

      <h3 class="font-bold text-blue-700 mb-3">
        Información de la Propiedad
      </h3>

      <div class="grid md:grid-cols-2 gap-4">

        <div>
          <strong>Título:</strong><br>
          {{ selectedProperty.title }}
        </div>

        <div>
          <strong>Estado:</strong><br>
          {{ selectedProperty.status }}
        </div>

        <div>
          <strong>Dirección:</strong><br>
          {{ selectedProperty.address }}
        </div>

        <div>
          <strong>Precio:</strong><br>

          {{
            selectedProperty.price
            | currency:'COP':'symbol':'1.0-0'
          }}

        </div>

      </div>

    </div>

    <!-- FECHA -->

    <div>
      <label class="block mb-2 font-semibold">
        Fecha
      </label>

      <p-datepicker
        [(ngModel)]="visit.date"
        dateFormat="yy-mm-dd"
        [showIcon]="true"
        appendTo="body"
        styleClass="w-full"
        inputStyleClass="w-full">
      </p-datepicker>
    </div>

    <!-- ESTADO -->

    <div>
      <label class="block mb-2 font-semibold">
        Estado de la Visita
      </label>

      <p-select
        [(ngModel)]="visit.status"
        [options]="statusOptions"
        optionLabel="label"
        optionValue="value"
        styleClass="w-full">
      </p-select>
    </div>

    <!-- OBSERVACIONES -->

    <div class="md:col-span-2">
      <label class="block mb-2 font-semibold">
        Observaciones
      </label>

      <textarea
        pTextarea
        [(ngModel)]="visit.observations"
        rows="4"
        class="w-full"
        placeholder="Observaciones realizadas durante la visita">
      </textarea>
    </div>

    <!-- RESULTADO -->

    <div class="md:col-span-2">
      <label class="block mb-2 font-semibold">
        Resultado de la Visita
      </label>

      <textarea
        pTextarea
        [(ngModel)]="visit.result"
        rows="4"
        class="w-full"
        placeholder="¿Qué ocurrió después de la visita? ¿El cliente mostró interés?">
      </textarea>
    </div>

  </div>

  <div class="flex gap-2 mt-6">

    <p-button
      label="Guardar"
      icon="pi pi-save"
      (onClick)="save()"
      [loading]="loading">
    </p-button>

    <button
      pButton
      type="button"
      label="Cancelar"
      icon="pi pi-times"
      class="p-button-secondary"
      routerLink="/visit">
    </button>

  </div>

</div>

<p-toast></p-toast>
