<div class="card p-6 bg-white rounded-xl shadow">

  <h2 class="text-2xl font-bold mb-4">
    Editar Pago
  </h2>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

    <div>
      <label class="block mb-2 font-semibold">
        Contrato
      </label>

      <p-select
        [(ngModel)]="payment.contract"
        [options]="contracts"
        optionLabel="id"
        optionValue="id"
        placeholder="Seleccione contrato"
        styleClass="w-full">
      </p-select>
    </div>

    <div>
      <label class="block mb-2 font-semibold">
        Monto
      </label>

      <p-inputnumber
        [(ngModel)]="payment.amount"
        mode="currency"
        currency="COP"
        locale="es-CO"
        styleClass="w-full">
      </p-inputnumber>
    </div>

    <div>
      <label class="block mb-2 font-semibold">
        Fecha
      </label>

      <input
        pInputText
        [(ngModel)]="payment.date"
        class="w-full">
    </div>

    <div>
      <label class="block mb-2 font-semibold">
        Método
      </label>

      <input
        pInputText
        [(ngModel)]="payment.method"
        class="w-full">
    </div>

  </div>

  <div class="flex gap-2 mt-6">

    <p-button
      label="Actualizar"
      icon="pi pi-save"
      (onClick)="update()"
      [loading]="loading">
    </p-button>

    <p-button
      label="Cancelar"
      icon="pi pi-times"
      severity="secondary"
      [routerLink]="['/payment']">
    </p-button>

  </div>

</div>

<p-toast></p-toast>
