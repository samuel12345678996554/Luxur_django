<div class="max-w-4xl mx-auto p-6">

  <div class="bg-white rounded-lg shadow-lg p-8">

    <h2 class="text-2xl font-bold mb-6 text-gray-800">
      Editar Pago
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- CONTRATO -->

      <div class="flex flex-col">

        <label class="block mb-2 font-semibold text-gray-700">
          Contrato *
        </label>

        <p-select
          [(ngModel)]="payment.contract"
          [options]="contracts"
          placeholder="Seleccione un contrato"
          class="w-full">
        </p-select>

      </div>

      <!-- MONTO -->

      <div class="flex flex-col">

        <label class="block mb-2 font-semibold text-gray-700">
          Monto *
        </label>

        <p-inputNumber
          [(ngModel)]="payment.amount"
          mode="currency"
          currency="COP"
          locale="es-CO"
          [min]="0"
          class="w-full">
        </p-inputNumber>

      </div>

      <!-- FECHA -->

      <div class="flex flex-col">

        <label class="block mb-2 font-semibold text-gray-700">
          Fecha *
        </label>

        <p-datepicker
          [(ngModel)]="payment.date"
          dateFormat="yy-mm-dd"
          [showIcon]="true"
          appendTo="body"
          styleClass="w-full"
          inputStyleClass="w-full">
        </p-datepicker>

      </div>

      <!-- MÉTODO -->

      <div class="flex flex-col">

        <label class="block mb-2 font-semibold text-gray-700">
          Método de Pago *
        </label>

        <input
          pInputText
          [(ngModel)]="payment.method"
          placeholder="Ej: Efectivo, Transferencia, Nequi"
          class="w-full" />

      </div>

    </div>

    <!-- BOTONES -->

    <div class="flex justify-center mt-8">

      <div class="bg-gray-50 rounded-lg p-4 flex gap-4 items-center">

        <button
          pButton
          type="button"
          label="Actualizar"
          icon="pi pi-save"
          (click)="update()"
          [loading]="loading"
          [disabled]="loading">
        </button>

        <button
          pButton
          type="button"
          label="Cancelar"
          icon="pi pi-times"
          class="p-button-secondary"
          routerLink="/payment"
          [disabled]="loading">
        </button>

      </div>

    </div>

  </div>

</div>

<p-toast></p-toast>
