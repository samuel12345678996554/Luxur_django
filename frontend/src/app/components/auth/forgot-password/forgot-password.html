<div class="flex items-center justify-center min-h-screen bg-gray-100">

  <p-card class="w-full max-w-md shadow-4">

    <ng-template pTemplate="header">
      <div class="text-center pt-6">

        <div
          class="w-16 h-16 bg-black rounded-md flex items-center justify-center text-white font-bold text-2xl mx-auto mb-4">
          L
        </div>

        <h2 class="text-2xl font-bold text-gray-800">
          Recuperar contraseña
        </h2>

        <p class="text-gray-600 mt-2">
          Ingresa tu usuario y tu nueva contraseña
        </p>

      </div>
    </ng-template>

    <form
      [formGroup]="form"
      (ngSubmit)="recoverPassword()"
      class="space-y-4 p-3">

      <!-- Usuario -->
      <div class="flex flex-col">

        <label class="block mb-2 font-semibold text-gray-700">
          Usuario
        </label>

        <input
          pInputText
          type="text"
          formControlName="username"
          placeholder="Ingrese su usuario"
          class="w-full" />

      </div>

      <!-- Nueva contraseña -->
      <div class="flex flex-col">

        <label class="block mb-2 font-semibold text-gray-700">
          Nueva contraseña
        </label>

        <input
          pInputText
          type="password"
          formControlName="newPassword"
          placeholder="Ingrese la nueva contraseña"
          class="w-full" />

      </div>

      <!-- Confirmar contraseña -->
      <div class="flex flex-col">

        <label class="block mb-2 font-semibold text-gray-700">
          Confirmar contraseña
        </label>

        <input
          pInputText
          type="password"
          formControlName="confirmPassword"
          placeholder="Confirme la contraseña"
          class="w-full" />

      </div>

      <!-- Botón restablecer -->
      <button
        pButton
        type="submit"
        label="Restablecer contraseña"
        icon="pi pi-refresh"
        class="w-full p-button-primary">
      </button>

      <!-- Volver -->
      <button
        pButton
        type="button"
        label="Volver al Login"
        icon="pi pi-arrow-left"
        class="w-full p-button-secondary"
        (click)="goToLogin()">
      </button>

    </form>

  </p-card>

</div>

<p-toast></p-toast>
