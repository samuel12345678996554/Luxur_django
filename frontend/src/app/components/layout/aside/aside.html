<div class="w-full">

    <!-- CLIENTES -->
    <div class="border-b border-gray-700">
      <button 
        (click)="toggleClients()"
        class="w-full px-4 py-3 bg-gray-800 text-white font-semibold flex items-center justify-between hover:bg-gray-700 transition-colors"
      >
        <div class="flex items-center gap-2">
          <i class="pi pi-users"></i>
          <span>Clientes</span>
        </div>
        <i class="pi" [ngClass]="clientsOpen ? 'pi-chevron-up' : 'pi-chevron-down'"></i>
      </button>
      <div *ngIf="clientsOpen" class="bg-gray-900">
        <a 
          routerLink="/client" 
          routerLinkActive="bg-blue-600 text-white" 
          [routerLinkActiveOptions]="{exact: true}"
          class="flex items-center gap-2 px-6 py-2 text-gray-300 hover:bg-gray-700 transition-colors"
        >
          <i class="pi pi-list text-sm"></i>
          <span>Ver todos</span>
        </a>
        <a 
          routerLink="/client/create" 
          routerLinkActive="bg-blue-600 text-white" 
          class="flex items-center gap-2 px-6 py-2 text-gray-300 hover:bg-gray-700 transition-colors"
        >
          <i class="pi pi-plus text-sm"></i>
          <span>Crear</span>
        </a>
      </div>
    </div>
